<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>커뮤니티 통합 관리 포털</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .nav-bar { 
            width: 100%; 
            background: #333; 
            padding: 15px 0; 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .nav-btn { 
            padding: 8px 12px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            background: #555; 
            color: white; 
            transition: 0.3s; 
            font-size: 13px;
            width: 75px;
            height: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.2;
        }
        .nav-btn.active { 
            background: #007bff; 
        }
        
        .container { 
            width: 90%; 
            max-width: 500px; 
            background: white; 
            margin-top: 30px; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            margin-bottom: 50px; 
        }
        .form-section { 
            display: none; 
        }
        .form-section.active { 
            display: block; 
        }
        
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }
        .radio-group input {
            width: auto;
            margin-top: 0;
            margin-right: 8px;
        }
        
        canvas {
            border: 2px solid #007bff;
            border-radius: 8px;
            background: #fff;
            cursor: crosshair;
            width: 100%;
            height: 100px;
            box-sizing: border-box;
        }
        .btn-clear {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 13px;
        }

        .btn-submit, .btn-main { 
            width: 100%; 
            padding: 15px; 
            margin-top: 15px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 17px; 
            font-weight: bold; 
        }
        .btn-main {
            background-color: #28a745;
        }
        .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
        
        .success-screen {
            text-align: center;
            padding: 40px 20px;
        }
        .success-screen h2 {
            color: #28a745;
            margin-bottom: 20px;
        }
        .success-screen p {
            color: #555;
            font-size: 16px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="showForm('dashboard', this)"><span>메인</span><span>화면</span></button>
        <button class="nav-btn" onclick="showForm('repair', this)"><span>고장</span><span>접수</span></button>
        <button class="nav-btn" onclick="showForm('register', this)"><span>회원</span><span>가입</span></button>
        <button class="nav-btn" onclick="showForm('ot_reservation', this)"><span>OT</span><span>예약</span></button>
        <button class="nav-btn" onclick="showForm('cancel', this)"><span>해지</span><span>신청</span></button>
    </div>

    <div class="container">
        
        <div id="dashboard" class="form-section active">
            <h2>🏢 커뮤니티 관리 포털</h2>
            <p style="text-align:center; color:#666; margin-bottom:30px;">원하시는 업무 메뉴를 선택해 주세요.</p>
            <button class="btn-submit" onclick="showForm('repair', document.querySelectorAll('.nav-btn')[1])">🛠️ 기구 고장 및 불편 접수</button>
            <button class="btn-submit" onclick="showForm('register', document.querySelectorAll('.nav-btn')[2])">📝 신규 회원 가입 신청</button>
            <button class="btn-submit" onclick="showForm('ot_reservation', document.querySelectorAll('.nav-btn')[3])">📅 OT 예약 신청</button>
            <button class="btn-submit" onclick="showForm('cancel', document.querySelectorAll('.nav-btn')[4])">⚠️ 회원 해지 신청</button>
        </div>

        <div id="repair" class="form-section">
            <h2>🛠️ 기구 고장 및 불편 접수</h2>
            <form>
                <label>기구 이름 (또는 번호)</label>
                <input type="text" id="repairItem" placeholder="예) 런닝머신 3번">
                <label>고장 증상 선택</label>
                <select id="repairSymptom">
                    <option>증상을 선택해 주세요</option>
                    <option>작동 불능</option>
                    <option>소음 발생</option>
                    <option>부품 파손</option>
                    <option>기타</option>
                </select>
                <label>상세 내용</label>
                <textarea id="repairDetail" rows="4" placeholder="고장 부위나 특이사항을 적어주세요."></textarea>
                <button type="button" class="btn-submit" onclick="submitData('고장접수')">접수하기</button>
                <button type="button" class="btn-clear" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인으로</button>
            </form>
        </div>

        <div id="register" class="form-section">
            <h2>📝 신규 회원 가입 신청</h2>
            <form>
                <label>이름</label>
                <input type="text" placeholder="성함을 입력하세요">
                <label>동/호수</label>
                <input type="text" placeholder="예) 101동 1502호">
                <label>연락처</label>
                <input type="tel" placeholder="010-0000-0000">
                
                <label>본인 확인 서명 (사인)</label>
                <canvas id="regCanvas" height="100"></canvas>
                <button type="button" class="btn-clear" onclick="clearCanvas('regCanvas')">지우기</button>
                
                <button type="button" class="btn-submit" onclick="submitData('가입신청')">가입 신청하기</button>
                <button type="button" class="btn-clear" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인으로</button>
            </form>
        </div>

        <div id="ot_reservation" class="form-section">
            <h2>📅 OT 예약 신청</h2>
            <form>
                <label>이름</label>
                <input type="text" placeholder="성함을 입력하세요">
                <label>동/호수</label>
                <input type="text" placeholder="예) 101동 1502호">
                <label>연락처</label>
                <input type="tel" placeholder="010-0000-0000">
                
                <label>시간대 선택 (오전/오후)</label>
                <div class="radio-group">
                    <label><input type="radio" name="otTime" value="오전" checked> 오전</label>
                    <label><input type="radio" name="otTime" value="오후"> 오후</label>
                </div>
                
                <label>본인 확인 서명 (사인)</label>
                <canvas id="otCanvas" height="100"></canvas>
                <button type="button" class="btn-clear" onclick="clearCanvas('otCanvas')">지우기</button>
                
                <button type="button" class="btn-submit" onclick="submitData('OT예약')">예약 신청하기</button>
                <button type="button" class="btn-clear" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인으로</button>
            </form>
        </div>

        <div id="cancel" class="form-section">
            <h2>⚠️ 회원 해지 신청</h2>
            <form>
                <label>이름 / 동호수</label>
                <input type="text" placeholder="성함과 동호수를 입력하세요">
                <label>해지 사유</label>
                <textarea rows="3" placeholder="해지 사유를 간단히 적어주세요 (시설 불만족, 이사 등)"></textarea>
                
                <label>본인 확인 서명 (사인)</label>
                <canvas id="cancelCanvas" height="100"></canvas>
                <button type="button" class="btn-clear" onclick="clearCanvas('cancelCanvas')">지우기</button>
                
                <button type="button" class="btn-submit" onclick="submitData('해지신청')">해지 신청하기</button>
                <button type="button" class="btn-clear" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인으로</button>
            </form>
        </div>

        <div id="success_screen" class="form-section success-screen">
            <h2>🎉 등록이 완료되었습니다!</h2>
            <p>요청하신 내용이 정상적으로 접수되었습니다.</p>
            <button class="btn-main" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인 화면으로 이동</button>
        </div>

        <div class="footer">커뮤니티 스마트 관리 시스템 통합 포털</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUogONfMVgMXOkPwdGoOMSZ0aIZoFwsVBbOiuodLL5UecAWgOKN1CyIgXB2TiLo-AX1g/exec";

        document.addEventListener("DOMContentLoaded", () => {
            setupCanvas("regCanvas");
            setupCanvas("otCanvas");
            setupCanvas("cancelCanvas");
        });

        function setupCanvas(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext("2d");
            let isDrawing = false;

            canvas.addEventListener("mousedown", (e) => {
                isDrawing = true;
                ctx.beginPath();
                ctx.moveTo(e.offsetX, e.offsetY);
            });
            canvas.addEventListener("mousemove", (e) => {
                if (isDrawing) {
                    ctx.lineTo(e.offsetX, e.offsetY);
                    ctx.stroke();
                }
            });
            canvas.addEventListener("mouseup", () => { isDrawing = false; });
            canvas.addEventListener("mouseleave", () => { isDrawing = false; });

            canvas.addEventListener("touchstart", (e) => {
                isDrawing = true;
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
                e.preventDefault();
            });
            canvas.addEventListener("touchmove", (e) => {
                if (isDrawing) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
                    ctx.stroke();
                }
                e.preventDefault();
            });
            canvas.addEventListener("touchend", () => { isDrawing = false; });
        }

        function clearCanvas(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function showForm(formId, btn) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
            
            if (formId !== 'success_screen') {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                if (btn) btn.classList.add('active');
            }
        }

        function submitData(type) {
            let data = {};
            let sheetName = "";

            if (type === '고장접수') {
                sheetName = "고장접수";
                data = {
                    repairItem: document.getElementById('repairItem').value,
                    repairSymptom: document.getElementById('repairSymptom').value,
                    repairDetail: document.getElementById('repairDetail').value
                };
            } else if (type === '가입신청') {
                sheetName = "가입신청";
                data = {
                    regName: document.querySelectorAll('#register input')[0].value,
                    regApt: document.querySelectorAll('#register input')[1].value,
                    regPhone: document.querySelectorAll('#register input')[2].value,
                    regSign: "서명 완료"
                };
            } else if (type === 'OT예약') {
                sheetName = "OT예약";
                const otTimeValue = document.querySelector('input[name="otTime"]:checked').value;
                data = {
                    otName: document.querySelectorAll('#ot_reservation input')[0].value,
                    otApt: document.querySelectorAll('#ot_reservation input')[1].value,
                    otPhone: document.querySelectorAll('#ot_reservation input')[2].value,
                    otTime: otTimeValue,
                    otSign: "서명 완료"
                };
            } else if (type === '해지신청') {
                sheetName = "해지신청";
                data = {
                    cancelNameApt: document.querySelector('#cancel input').value,
                    cancelReason: document.querySelector('#cancel textarea').value,
                    cancelSign: "서명 완료"
                };
            }

            let formData = new FormData();
            formData.append('sheetName', sheetName);
            formData.append('data', JSON.stringify(data));

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(res => {
                showForm('success_screen');
            })
            .catch(err => {
                showForm('success_screen');
            });
        }
    </script>
</body>
</html>
