<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzevC4LEPVe7v5C0jw9yAVrJWhPIT52pwA4IJDtiekcpp0vA_iXFWXk5ofF42t0EH9_AA/exec";

document.addEventListener("DOMContentLoaded", () => {
  ['regCanvas','otCanvas','cancelCanvas'].forEach(id => setupCanvas(id));
});

/* ==========================
   서명 캔버스
========================== */

function setupCanvas(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const label = document.getElementById(id.replace('Canvas','CanvasLabel'));

  let drawing = false;
  let hasDraw = false;

  const pos = (e, rect) => {
    const src = e.touches ? e.touches[0] : e;

    return {
      x: (src.clientX - rect.left) * (canvas.width / rect.width),
      y: (src.clientY - rect.top) * (canvas.height / rect.height)
    };
  };

  const start = e => {
    drawing = true;

    if (!hasDraw && label) {
      label.style.opacity = "0";
      hasDraw = true;
    }

    const p = pos(e, canvas.getBoundingClientRect());

    ctx.beginPath();
    ctx.moveTo(p.x, p.y);

    e.preventDefault?.();
  };

  const move = e => {
    if (!drawing) return;

    const p = pos(e, canvas.getBoundingClientRect());

    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = "#c9a84c";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();

    e.preventDefault?.();
  };

  const stop = () => drawing = false;

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", stop);
  canvas.addEventListener("mouseleave", stop);

  canvas.addEventListener("touchstart", start, { passive:false });
  canvas.addEventListener("touchmove", move, { passive:false });
  canvas.addEventListener("touchend", stop);
}

function clearCanvas(id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const label = document.getElementById(id.replace('Canvas','CanvasLabel'));
  if (label) label.style.opacity = "1";
}

function isCanvasSigned(id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext("2d");

  const pixels = ctx.getImageData(0,0,canvas.width,canvas.height).data;

  for (let i = 3; i < pixels.length; i += 4) {
    if (pixels[i] !== 0) return true;
  }

  return false;
}

/* ==========================
   화면 이동
========================== */

function showForm(id, btn) {
  document.querySelectorAll('.form-section').forEach(s => {
    s.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');

  if (id !== 'success_screen' && id !== 'inquiry') {
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.remove('active');
    });

    if (btn) btn.classList.add('active');
  }

  window.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
}

/* ==========================
   전체 초기화
========================== */

function resetAll() {

  document.querySelectorAll('input[type="text"], input[type="tel"], textarea')
    .forEach(el => el.value = '');

  document.querySelectorAll('select')
    .forEach(el => el.selectedIndex = 0);

  const am = document.getElementById("t-am");
  if (am) am.checked = true;

  ['regCanvas','otCanvas','cancelCanvas'].forEach(id => clearCanvas(id));

  const box = document.getElementById("search-result");
  if (box) {
    box.classList.remove("active");
    box.innerHTML = "";
  }
}

/* ==========================
   조회 저장
========================== */

function saveRecord(dong, ho, title, details) {
  let arr = JSON.parse(localStorage.getItem("userRecords")) || [];

  arr.push({
    dong,
    ho,
    title,
    details,
    date: new Date().toLocaleDateString("ko-KR")
  });

  localStorage.setItem("userRecords", JSON.stringify(arr));
}

/* ==========================
   접수 내역 조회
========================== */

function searchRecord() {
  const dong = document.getElementById("input-dong").value.trim();
  const ho   = document.getElementById("input-ho").value.trim();

  const box = document.getElementById("search-result");

  if (!dong || !ho) {
    box.classList.add("active");
    box.innerHTML = "동/호수를 입력하세요.";
    return;
  }

  const arr = JSON.parse(localStorage.getItem("userRecords")) || [];

  const result = arr.filter(v => v.dong === dong && v.ho === ho);

  box.classList.add("active");

  if (result.length === 0) {
    box.innerHTML = "조회 내역이 없습니다.";
    return;
  }

  let html = "";

  result.forEach(v => {
    html += `
      <div class="result-row">
        <div class="result-type">${v.title}</div>
        <div class="result-detail">${v.date} · ${v.details}</div>
      </div>
    `;
  });

  box.innerHTML = html;
}

/* ==========================
   제출
========================== */

function submitData(type) {

  let dong = '';
  let ho = '';
  let title = '';
  let details = '';
  let obj = {};

  /* 서명 필수 */

  if (type === '가입신청' && !isCanvasSigned('regCanvas')) {
    alert('서명을 완료해야 가입 신청이 가능합니다.');
    return;
  }

  if (type === 'OT예약' && !isCanvasSigned('otCanvas')) {
    alert('서명을 완료해야 OT 예약이 가능합니다.');
    return;
  }

  if (type === '해지신청' && !isCanvasSigned('cancelCanvas')) {
    alert('서명을 완료해야 해지 신청이 가능합니다.');
    return;
  }

  /* 고장접수 */

  if (type === '고장접수') {

    dong = document.getElementById('repairDong').value.trim();
    ho   = document.getElementById('repairHo').value.trim();

    const item   = document.getElementById('repairItem').value.trim();
    const symp   = document.getElementById('repairSymptom').value;
    const detail = document.getElementById('repairDetail').value.trim();

    title = '고장접수 신고';
    details = item + ' / ' + symp;

    obj = { dong, ho, item, symptom:symp, detail };
  }

  /* 가입신청 */

  else if (type === '가입신청') {

    const name  = document.getElementById('regName').value.trim();
    dong        = document.getElementById('regDong').value.trim();
    ho          = document.getElementById('regHo').value.trim();
    const phone = document.getElementById('regPhone').value.trim();

    title = '회원가입신청';
    details = '이름: ' + name;

    obj = { name, dong, ho, phone };
  }

  /* OT예약 */

  else if (type === 'OT예약') {

    const name  = document.getElementById('otName').value.trim();
    dong        = document.getElementById('otDong').value.trim();
    ho          = document.getElementById('otHo').value.trim();
    const phone = document.getElementById('otPhone').value.trim();

    const time = document.querySelector('input[name="otTime"]:checked').value;

    title = 'OT신청';
    details = '이름: ' + name + ' / 시간대: ' + time;

    obj = { name, dong, ho, phone, time };
  }

  /* 해지신청 */

  else if (type === '해지신청') {

    const name   = document.getElementById('cancelName').value.trim();
    dong         = document.getElementById('cancelDong').value.trim();
    ho           = document.getElementById('cancelHo').value.trim();
    const phone  = document.getElementById('cancelPhone').value.trim();

    const reason = document.getElementById('cancelReason').value;

    title = '회원해지신청';
    details = '이름: ' + name + ' / 사유: ' + reason;

    obj = { name, dong, ho, phone, reason };
  }

  if (dong && ho) {
    saveRecord(dong, ho, title, details);
  }

  const fd = new FormData();
  fd.append("sheetName", type);
  fd.append("data", JSON.stringify(obj));

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: fd
  })
  .then(() => {

    /* 성공 후 즉시 초기화 */
    resetAll();

    /* 완료 화면 */
    showForm("success_screen");

  })
  .catch(() => {
    alert("전송 중 오류가 발생했습니다.");
  });
}
</script>
