<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>커뮤니티 통합 관리 포털</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-color: #38bdf8;
            --primary-hover: #0ea5e9;
            --success-color: #34d399;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --btn-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-main);
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        .nav-bar { 
            width: 100%; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px);
            padding: 12px 0; 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid var(--border-color);
        }

        .nav-btn { 
            padding: 10px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            background: var(--btn-bg); 
            color: var(--text-sub); 
            transition: all 0.3s ease; 
            font-size: 13px;
            width: 78px;
            height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.3;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .nav-btn:hover {
            color: var(--text-main);
            background: rgba(56, 189, 248, 0.1);
            transform: translateY(-2px);
        }

        .nav-btn.active { 
            background: var(--primary-color); 
            color: #0f172a; 
            font-weight: 700;
        }
        
        .container { 
            width: 90%; 
            max-width: 500px; 
            background: var(--card-bg); 
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            margin-top: 35px; 
            padding: 35px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3); 
            margin-bottom: 60px; 
        }

        .form-section { 
            display: none; 
        }
        .form-section.active { 
            display: block; 
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h2 { 
            text-align: center; 
            color: var(--text-main); 
            margin-bottom: 25px; 
            font-size: 22px;
            letter-spacing: -0.5px;
        }

        label { 
            display: block; 
            margin-top: 18px; 
            font-weight: 600; 
            color: var(--text-sub); 
            font-size: 14px;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px; 
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            color: var(--text-main);
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 15px; 
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .apt-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .radio-group {
            display: flex;
            gap: 24px;
            margin-top: 12px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
            color: var(--text-main);
        }
        .radio-group input {
            width: auto;
            margin-top: 0;
            margin-right: 8px;
            accent-color: var(--primary-color);
        }
        
        canvas {
            border: 2px solid rgba(56, 189, 248, 0.4);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.8);
            cursor: crosshair;
            width: 100%;
            height: 100px;
            box-sizing: border-box;
            margin-top: 8px;
        }

        .btn-clear {
            background-color: #475569;
            color: var(--text-main);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-clear:hover {
            background-color: #64748b;
        }

        .btn-submit, .btn-main { 
            width: 100%; 
            padding: 16px; 
            margin-top: 18px; 
            background: var(--primary-color); 
            color: #0f172a; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 700; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.3);
        }

        .btn-submit:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
        }

        .btn-main {
            background-color: var(--success-color);
            color: #0f172a;
            box-shadow: 0 4px 14px 0 rgba(52, 211, 153, 0.3);
        }
        .btn-main:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .footer { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 12px; 
            color: #64748b; 
        }
        
        .success-screen {
            text-align: center;
            padding: 50px 20px;
        }
        .success-screen h2 {
            color: var(--success-color);
            margin-bottom: 20px;
        }
        .success-screen p {
            color: var(--text-sub);
            font-size: 16px;
            margin-bottom: 35px;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="showForm('dashboard', this)"><span>메인</span><span>화면</span></button>
        <button class="nav-btn" onclick="showForm('repair', this)"><span>고장</span><span>접수</span></button>
        <button class="nav-btn" onclick="showForm('register', this)"><span>회원</span><span>가입</span></button>
        <button class="nav-btn" onclick="showForm('ot_reservation', this)"><span>OT</span><span>예약</span></button>
        <button class="nav-btn" onclick="showForm('cancel', this)"><span>해지</span><span>신청</span></button>
    </div>

    <div class="container">
        
        <div id="dashboard" class="form-section active">
            <h2>🏢 커뮤니티 관리 포털</h2>
            <p style="text-align:center; color:var(--text-sub); margin-bottom:30px;">원하시는 업무 메뉴를 선택해 주세요.</p>
            <button class="btn-submit" onclick="showForm('repair', document.querySelectorAll('.nav-btn')[1])">🛠️ 기구 고장 및 불편 접수</button>
            <button class="btn-submit" onclick="showForm('register', document.querySelectorAll('.nav-btn')[2])">📝 신규 회원 가입 신청</button>
            <button class="btn-submit" onclick="showForm('ot_reservation', document.querySelectorAll('.nav-btn')[3])">📅 OT 예약 신청</button>
            <button class="btn-submit" onclick="showForm('cancel', document.querySelectorAll('.nav-btn')[4])">⚠️ 회원 해지 신청</button>
        </div>

        <div id="repair" class="form-section">
            <h2>🛠️ 기구 고장 및 불편 접수</h2>
            <form>
                <label>기구 이름 (또는 번호)</label>
                <input type="text" id="repairItem" placeholder="예) 런닝머신 3번">
                <label>고장 증상 선택</label>
                <select id="repairSymptom">
                    <option>증상을 선택해 주세요</option>
                    <option>작동 불능</option>
                    <option>소음 발생</option>
                    <option>부품 파손</option>
                    <option>기타</option>
                </select>
                <label>상세 내용</label>
                <textarea id="repairDetail" rows="4" placeholder="고장 부위나 특이사항을 적어주세요."></textarea>
                <button type="button" class="btn-submit" onclick="submitData('고장접수')">접수하기</button>
                <button type="button" class="btn-clear" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인으로</button>
            </form>
        </div>

        <div id="register" class="form-section">
            <h2>📝 신규 회원 가입 신청</h2>
            <form>
                <label>이름</label>
                <input type="text" placeholder="성함을 입력하세요">
                
                <div class="apt-group">
                    <div>
                        <label>동</label>
                        <input type="text" placeholder="예) 101">
                    </div>
                    <div>
                        <label>호수</label>
                        <input type="text" placeholder="예) 1502">
                    </div>
                </div>

                <label>연락처</label>
                <input type="tel" placeholder="010-0000-0000">
                
                <label>본인 확인 서명 (사인)</label>
                <canvas id="regCanvas" height="100"></canvas>
                <button type="button" class="btn-clear" onclick="clearCanvas('regCanvas')">지우기</button>
                
                <button type="button" class="btn-submit" onclick="submitData('가입신청')">가입 신청하기</button>
                <button type="button" class="btn-clear" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인으로</button>
            </form>
        </div>

        <div id="ot_reservation" class="form-section">
            <h2>📅 OT 예약 신청</h2>
            <form>
                <label>이름</label>
                <input type="text" placeholder="성함을 입력하세요">
                
                <div class="apt-group">
                    <div>
                        <label>동</label>
                        <input type="text" placeholder="예) 101">
                    </div>
                    <div>
                        <label>호수</label>
                        <input type="text" placeholder="예) 1502">
                    </div>
                </div>

                <label>연락처</label>
                <input type="tel" placeholder="010-0000-0000">
                
                <label>시간대 선택 (오전/오후)</label>
                <div class="radio-group">
                    <label><input type="radio" name="otTime" value="오전" checked> 오전</label>
                    <label><input type="radio" name="otTime" value="오후"> 오후</label>
                </div>
                
                <label>본인 확인 서명 (사인)</label>
                <canvas id="otCanvas" height="100"></canvas>
                <button type="button" class="btn-clear" onclick="clearCanvas('otCanvas')">지우기</button>
                
                <button type="button" class="btn-submit" onclick="submitData('OT예약')">예약 신청하기</button>
                <button type="button" class="btn-clear" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인으로</button>
            </form>
        </div>

        <div id="cancel" class="form-section">
            <h2>⚠️ 회원 해지 신청</h2>
            <form>
                <label>이름</label>
                <input type="text" placeholder="성함을 입력하세요">

                <div class="apt-group">
                    <div>
                        <label>동</label>
                        <input type="text" placeholder="예) 101">
                    </div>
                    <div>
                        <label>호수</label>
                        <input type="text" placeholder="예) 1502">
                    </div>
                </div>
                
                <label>해지 사유</label>
                <textarea rows="3" placeholder="해지 사유를 간단히 적어주세요 (시설 불만족, 이사 등)"></textarea>
                
                <label>본인 확인 서명 (사인)</label>
                <canvas id="cancelCanvas" height="100"></canvas>
                <button type="button" class="btn-clear" onclick="clearCanvas('cancelCanvas')">지우기</button>
                
                <button type="button" class="btn-submit" onclick="submitData('해지신청')">해지 신청하기</button>
                <button type="button" class="btn-clear" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인으로</button>
            </form>
        </div>

        <div id="success_screen" class="form-section success-screen">
            <h2>🎉 등록이 완료되었습니다!</h2>
            <p>요청하신 내용이 정상적으로 접수되었습니다.</p>
            <button class="btn-main" onclick="showForm('dashboard', document.querySelectorAll('.nav-btn')[0])">메인 화면으로 이동</button>
        </div>

        <div class="footer">커뮤니티 스마트 관리 시스템 통합 포털</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVP0l7ByVic7tIEmrfRLT1piER9vtN5LsrcdAL-MEbJr2nryPGWoCfAFlF2Rt6xxeuuA/exec";

        document.addEventListener("DOMContentLoaded", () => {
            setupCanvas("regCanvas");
            setupCanvas("otCanvas");
            setupCanvas("cancelCanvas");
        });

        function setupCanvas(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext("2d");
            let isDrawing = false;

            canvas.addEventListener("mousedown", (e) => {
                isDrawing = true;
                ctx.beginPath();
                ctx.moveTo(e.offsetX, e.offsetY);
            });
            canvas.addEventListener("mousemove", (e) => {
                if (isDrawing) {
                    ctx.lineTo(e.offsetX, e.offsetY);
                    ctx.stroke();
                }
            });
            canvas.addEventListener("mouseup", () => { isDrawing = false; });
            canvas.addEventListener("mouseleave", () => { isDrawing = false; });

            canvas.addEventListener("touchstart", (e) => {
                isDrawing = true;
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
                e.preventDefault();
            });
            canvas.addEventListener("touchmove", (e) => {
                if (isDrawing) {
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
                    ctx.stroke();
                }
                e.preventDefault();
            });
            canvas.addEventListener("touchend", () => { isDrawing = false; });
        }

        function clearCanvas(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function showForm(formId, btn) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
            
            if (formId !== 'success_screen') {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                if (btn) btn.classList.add('active');
            }
            
            if (formId === 'dashboard') {
                resetAllForms();
            }
        }
        
        function resetAllForms() {
            const inputs = document.querySelectorAll('input, textarea, select');
            inputs.forEach(input => {
                if (input.type !== 'radio') {
                    input.value = '';
                } else {
                    if (input.value === '오전') input.checked = true;
                }
            });
            clearCanvas('regCanvas');
            clearCanvas('otCanvas');
            clearCanvas('cancelCanvas');
        }

        function submitData(type) {
            let data = {};
            let sheetName = "";

            if (type === '고장접수') {
                sheetName = "고장접수";
                data = {
                    repairItem: document.getElementById('repairItem').value,
                    repairSymptom: document.getElementById('repairSymptom').value,
                    repairDetail: document.getElementById('repairDetail').value
                };
            } else if (type === '가입신청') {
                sheetName = "가입신청";
                const inputs = document.querySelectorAll('#register input');
                data = {
                    regName: inputs[0].value,
                    regApt: inputs[1].value + "동 " + inputs[2].value + "호",
                    regPhone: inputs[3].value,
                    regSign: "서명 완료"
                };
            } else if (type === 'OT예약') {
                sheetName = "OT예약";
                const inputs = document.querySelectorAll('#ot_reservation input');
                const otTimeValue = document.querySelector('input[name="otTime"]:checked').value;
                data = {
                    otName: inputs[0].value,
                    otApt: inputs[1].value + "동 " + inputs[2].value + "호",
                    otPhone: inputs[3].value,
                    otTime: otTimeValue,
                    otSign: "서명 완료"
                };
            } else if (type === '해지신청') {
                sheetName = "해지신청";
                const inputs = document.querySelectorAll('#cancel input');
                data = {
                    cancelNameApt: inputs[0].value + " / " + inputs[1].value + "동 " + inputs[2].value + "호",
                    cancelReason: document.querySelector('#cancel textarea').value,
                    cancelSign: "서명 완료"
                };
            }

            let formData = new FormData();
            formData.append('sheetName', sheetName);
            formData.append('data', JSON.stringify(data));

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(res => {
                resetAllForms();
                showForm('success_screen');
            })
            .catch(err => {
                resetAllForms();
                showForm('success_screen');
            });
        }
    </script>
</body>
</html>
